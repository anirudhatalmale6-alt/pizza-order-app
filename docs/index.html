<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jen's Pizzeria - Download App</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #FFF3E0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: white;
  border-radius: 24px;
  padding: 40px 30px;
  max-width: 400px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}
.logo { font-size: 64px; margin-bottom: 16px; }
h1 { color: #E64A19; font-size: 28px; margin-bottom: 8px; }
.subtitle { color: #666; font-size: 16px; margin-bottom: 32px; }
.download-btn {
  display: block;
  background: #E64A19;
  color: white;
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
  padding: 20px 40px;
  border-radius: 16px;
  margin-bottom: 16px;
  transition: background 0.2s;
}
.download-btn:hover, .download-btn:active {
  background: #BF360C;
}
.version { color: #999; font-size: 13px; margin-top: 8px; }
.instructions {
  text-align: left;
  background: #FFF8E1;
  border-radius: 12px;
  padding: 20px;
  margin-top: 24px;
  font-size: 15px;
  line-height: 1.8;
  color: #333;
}
.instructions b { color: #E64A19; }
.step { margin-bottom: 4px; }
</style>
<script>
// Auto-detect latest version from GitHub API
var REPO = 'anirudhatalmale6-alt/pizza-order-app';
var FALLBACK = 'v3.0.7';

function getDownloadUrl(tag) {
  return 'https://github.com/' + REPO + '/releases/download/' + tag + '/app-release.apk';
}

fetch('https://api.github.com/repos/' + REPO + '/releases/latest')
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var tag = d.tag_name || FALLBACK;
    var btn = document.getElementById('dl-btn');
    var ver = document.getElementById('ver');
    if (btn) btn.href = getDownloadUrl(tag);
    if (ver) ver.textContent = 'Version ' + tag;
  })
  .catch(function() {});
</script>
</head>
<body>
<div class="card">
  <div class="logo">&#127829;</div>
  <h1>Jen's Pizzeria</h1>
  <p class="subtitle">Order App for Staff</p>

  <a id="dl-btn" class="download-btn"
     href="https://github.com/anirudhatalmale6-alt/pizza-order-app/releases/download/v3.0.7/app-release.apk"
     download="JensPizzeria.apk">
    Download App
  </a>
  <p id="ver" class="version">Version v3.0.7</p>

  <div class="instructions">
    <div class="step"><b>1.</b> Tap Download above</div>
    <div class="step"><b>2.</b> Open the downloaded file</div>
    <div class="step"><b>3.</b> If asked, allow "Install from this source"</div>
    <div class="step"><b>4.</b> Tap Install</div>
  </div>
</div>
</body>
</html>
