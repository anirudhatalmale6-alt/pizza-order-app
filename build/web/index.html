<!DOCTYPE html>
<html>
<head>
  <base href="/pizza-order-app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Bites2Baht - Order management app for sellers">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bites2Baht">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Bites2Baht</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    var hiddenAt = 0;
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        hiddenAt = Date.now();
      } else if (hiddenAt > 0 && (Date.now() - hiddenAt) > 60000) {
        var cart = localStorage.getItem('flutter.saved_cart');
        if (!cart || cart === 'null' || cart === '[]') location.reload();
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
