<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Bites2Baht - Order management app for staff">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bites2Baht">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Bites2Baht</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
  if ('serviceWorker' in navigator && !sessionStorage.getItem('sw_cleaned')) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      if (regs.length > 0) {
        regs.forEach(function(r) { r.unregister(); });
        caches.keys().then(function(names) {
          names.forEach(function(n) { caches.delete(n); });
          sessionStorage.setItem('sw_cleaned', '1');
          location.reload();
        });
        return;
      }
      sessionStorage.setItem('sw_cleaned', '1');
    });
  }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
